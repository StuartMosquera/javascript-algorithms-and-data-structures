<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="./resources/css/styles.css">
  </head>
  <body>
    <!-- CONTAINER START -->
    <div class="container">
      <!-- HEADER START -->
      <header>
        <h1>I’ts a Palindrome?</h1>
      </header>
      <!-- HEADER END -->
      <!-- MAIN START -->
      <main>
        <section class="palindrome-section">
          <label for="text-input">Enter a text to find out if it is a Palindrome:</label>
          <input type="text" id="text-input">
          <button id="check-btn">Check</button>
          <span id="result"></span>
        </section>
        <section class="definition-section">
          <p>&#128161; A <em>palindrome</em> is a word or sentence that’s spelled the same way both forward and backward, ignoring punctuation, case, and spacing.</p>
        </section>
      </main>
      <!-- MAIN END -->
      <!-- FOOTER START -->
      <footer>
        <p>Made by Stuart Mosquera | 2025</p>
      </footer>
      <!-- FOOTER END -->
    </div>
    <!-- CONTAINER END -->
    <script src="./resources/js/script.js"></script>
    <noscript>
      <p>Your browser does not support JavaScript or you have JavaScript disabled.</p>
    </noscript>
  </body>
</html>
