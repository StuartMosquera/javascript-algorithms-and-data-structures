<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Search App</title>
    <link rel="stylesheet" href="./resources/css/styles.css">
  </head>
  <body>
    <!-- CONTAINER START -->
    <div class="container">
      <!-- HEADER START -->
      <header>
        <h1>Pokémon Search App</h1>
      </header>
      <!-- HEADER END -->
      <!-- MAIN START -->
      <main>
        <!-- FORM START -->
        <form action="" class="input-form">
          <label for="search-input">Search for Pokémon Name or ID:</label>
          <input type="text" id="search-input" required>
          <button id="search-button">Search</button>
        </form>
        <!-- FORM END -->
        <section class="pokemon-section">
          <div class="top-div">
            <h2 id="pokemon-name"></h2>
            <h2 id="pokemon-id"></h2>
          </div>
          <div class="mid-div">
            <p id="weight"></p>
            <p id="height"></p>
          </div>
          <div class="img-container"></div>
          <p id="types"></p>
        </section>
        <section class="stats-section">
          <table>
            <thead>
              <tr>
                <th>Base</th>
                <th>Stats</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>HP:</td>
                <td id="hp"></td>
              </tr>
              <tr>
                <td>Attack:</td>
                <td id="attack"></td>
              </tr>
              <tr>
                <td>Defense:</td>
                <td id="defense"></td>
              </tr>
              <tr>
                <td>Special Attack:</td>
                <td id="special-attack"></td>
              </tr>
              <tr>
                <td>Special Defense:</td>
                <td id="special-defense"></td>
              </tr>
              <tr>
                <td>Speed:</td>
                <td id="speed"></td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
      <!-- MAIN END -->
      <!-- FOOTER START -->
      <footer>
        <p>Made by Stuart Mosquera | 2025</p>
      </footer>
      <!-- FOOTER END -->
    </div>
    <!-- CONTAINER END -->
    <script src="./resources/js/script.js"></script>
    <noscript>
      <p>Your browser does not support JavaScript or you have JavaScript disabled.</p>
    </noscript>
  </body>
</html>
