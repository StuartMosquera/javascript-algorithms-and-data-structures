<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Register</title>
    <link rel="stylesheet" href="./resources/css/styles.css">
  </head>
  <body>
    <!-- CONTAINER START -->
    <div class="container">
      <!-- HEADER START -->
      <header>
        <h1>Cash Register</h1>
      </header>
      <!-- HEADER END -->
      <!-- MAIN START -->
      <main>
        <div id="change-due"></div>
        <section class="input-section">
          <label for="cash">Enter cash from costumer:</label>
          <input type="number" id="cash">
          <button id="purchase-btn">Purchase</button>
        </section>
        <section class="cash-register-section">
          <div class="total-div"></div>
          <div class="conector"></div>
          <div class="items-div">
            <div class="blocks-div">
              <div class="block"></div>
              <div class="block"></div>
              <div class="block"></div>
              <div class="block"></div>
              <div class="block"></div>
              <div class="block"></div>
              <div class="block"></div>
              <div class="block"></div>
              <div class="block"></div>
            </div>
            <div class="drawer-div"></div>
          </div>
          <div class="footer-div">
            <div class="circle"></div>
          </div>
        </section>
      </main>
      <!-- MAIN END -->
      <!-- FOOTER START -->
      <footer>
        <p>Made by Stuart Mosquera | 2025</p>
      </footer>
      <!-- FOOTER END -->
    </div>
    <!-- CONTAINER END -->
    <script src="./resources/js/script.js"></script>
    <noscript>
      <p>Your browser does not support JavaScript or you have JavaScript disabled.</p>
    </noscript>
  </body>
</html>
